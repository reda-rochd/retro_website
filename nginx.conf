server {
    listen 80;
    listen [::]:80;
    server_name 1337play.com www.1337play.com;
    return 301 https://1337play.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.1337play.com;

    ssl_certificate /etc/letsencrypt/live/1337play.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1337play.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://1337play.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 1337play.com;

    root /srv/1337play/web/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/1337play.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1337play.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location /game/ {
        root /srv/1337play/web/dist;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    client_max_body_size 10m;

    access_log /var/log/nginx/1337play.access.log;
    error_log /var/log/nginx/1337play.error.log;
}
